services:

  petcare-api:
    build: .
    container_name: petcare-api
    ports:
      - "8080:8080"
    environment:
      # Sobrescreve: spring.datasource.url
      # Usa o nome do contêiner do banco (postgres-db) em vez de localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/petcare_db
      
      # Sobrescreve: spring.kafka.bootstrap-servers
      # Usa host.docker.internal para alcançar o Kafka que está rodando no seu outro projeto!
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
    
    # Diz ao Docker para só subir a API depois que o banco estiver rodando
    depends_on:
      - postgres-db
  
  postgres-db:
    image: postgres:16-alpine
    container_name: petcare-db
    environment:
      POSTGRES_DB: petcare_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - petcare_data:/var/lib/postgresql/data

volumes:
  petcare_data: